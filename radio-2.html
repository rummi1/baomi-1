<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频背景打字机 · 每句一次音效</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #000;
            font-family: 'Courier New', monospace;
        }

        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .video-background video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .text-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            background: rgba(0, 0, 0, 0.3);
        }

        .typewriter-container {
            max-width: 1200px;
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        .history-lines {
            color: rgba(255, 255, 255, 0.6);
            font-size: 2rem;
            line-height: 1.8;
            max-height: 300px;
            overflow-y: auto;
            margin-bottom: 20px;
            order: 1;
        }

        .history-line {
            margin-bottom: 10px;
            opacity: 0;
            animation: fadeIn 0.5s forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .current-line {
            color: #fff;
            font-size: 3.5rem;
            line-height: 1.6;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
            min-height: 3.2rem;
            margin-bottom: 0;
            order: 2;
        }

        .cursor {
            display: inline-block;
            width: 3px;
            height: 1.2em;
            background: #0f0;
            animation: blink 1s infinite;
            vertical-align: text-bottom;
            margin-left: 2px;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        .audio-status {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 20;
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .audio-status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ff4444;
            transition: background 0.3s;
        }

        .audio-status-dot.active {
            background: #44ff44;
        }

        @media (max-width: 768px) {
            .current-line {
                font-size: 1.5rem;
            }
            .history-lines {
                font-size: 1rem;
                max-height: 200px;
            }
        }
    </style>
</head>
<body>
    <!-- 视频背景 -->
    <div class="video-background">
        <video id="bgVideo" muted playsinline autoplay>
            <!-- 请在这里修改视频文件路径 -->
            <source src="结尾-1-3.mp4" type="video/mp4">
        </video>
    </div>

    <!-- 文字覆盖层 -->
    <div class="text-overlay">
        <div class="typewriter-container">
            <div class="history-lines" id="historyLines"></div>
            <div class="current-line" id="currentLine">
                <span id="typedText"></span><span class="cursor"></span>
            </div>
        </div>
    </div>

    <!-- 音效状态指示器 -->
    <div class="audio-status" id="audioStatus">
        <span class="audio-status-dot" id="audioStatusDot"></span>
        <span id="audioStatusText">音效未激活</span>
    </div>

    <script>
        (function() {
            // ==================== 用户配置区域 ====================
            
            // 打字剧本配置
            const scriptConfig = [
                {
                    text: "据不完全统计，过去20年南山市网络用户超两千万，他们在网上肆无忌惮分享秘密，依赖网络获得温暖，也因网络滋生邪恶，有人随网络而生，亦有人因网络而亡",
                    startTime: 2,
                    typingSpeed: 80,
                    pauseAfter: 2000
                },
                {
                    text: "而我们，就是那些借着网络，收割生命的人",
                    startTime: 8,
                    typingSpeed: 230,
                    pauseAfter: 5000
                },
                {
                    text: "你把各种平台当成眼睛，社交账号当成助手，以为自己能窥探一切、掌控一切，以为那些藏在账号里的秘密，只有你自己知道。",
                    startTime: 14,
                    typingSpeed: 140,
                    pauseAfter: 4300
                },
                {
                    text: "可你错了，一直以来，是我们在借着这些账号，窥探着人们的秘密，操控着像你一样的人的一举一动。",
                    startTime: 20,
                    typingSpeed: 140,
                    pauseAfter: 3500
                },
                {
                    text: "而且这一次，死人站在我们这边。他们也是我们的眼睛，是我们的助手。",
                    startTime: 20,
                    typingSpeed: 200,
                    pauseAfter: 300
                },
                {
                    text: "现在，轮到你了",
                    startTime: 26,
                    typingSpeed: 500,
                    pauseAfter: 100
                }
            ];

            // ========== 外部音效文件配置 ==========
            const EXTERNAL_SOUND_FILE_PATH = '键盘上打字_耳聆网_[声音ID：10807].mp3';

            // ========== 音效播放速度调节 ==========
            const SOUND_PLAYBACK_RATE = 1.0;

            // ========== 视频结束后跳转的页面 ==========
            const VIDEO_END_REDIRECT_URL = 'end-1.html';

            // ========== 视频总时长（秒）- 请根据实际视频长度修改 ==========
            // 如果不确定具体时长，可以先设置为较大的值，或者留空让系统检测
            const VIDEO_DURATION = 55; // 假设视频长度为35秒，请根据实际修改

            // ==================== DOM 元素 ====================
            const video = document.getElementById('bgVideo');
            const typedText = document.getElementById('typedText');
            const historyLines = document.getElementById('historyLines');
            const audioStatusDot = document.getElementById('audioStatusDot');
            const audioStatusText = document.getElementById('audioStatusText');

            // ==================== 状态变量 ====================
            let currentScriptIndex = 0;
            let isTyping = false;
            let typingTimeout = null;
            let checkInterval = null;
            let hasRedirected = false; // 防止重复跳转
            
            // 当前正在播放的音效源
            let currentSoundSource = null;

            // 音频相关
            let audioContext = null;
            let audioEnabled = false;
            let customSoundBuffer = null;
            let hasExternalSound = false;

            // 视频时长检测
            let videoDuration = VIDEO_DURATION || 0;

            // ==================== 辅助函数 ====================
            function updateAudioStatusUI() {
                if (!audioContext) {
                    audioStatusDot.className = 'audio-status-dot';
                    audioStatusText.textContent = '音效不可用';
                    return;
                }
                if (hasExternalSound && audioContext.state === 'running' && customSoundBuffer) {
                    audioStatusDot.className = 'audio-status-dot active';
                    audioStatusText.textContent = '外部音效已激活';
                    audioEnabled = true;
                } else if (!hasExternalSound) {
                    audioStatusDot.className = 'audio-status-dot';
                    audioStatusText.textContent = '无外部音效 (静音)';
                    audioEnabled = false;
                } else if (audioContext.state !== 'running') {
                    audioStatusDot.className = 'audio-status-dot';
                    audioStatusText.textContent = '音效待激活';
                    audioEnabled = false;
                } else {
                    audioStatusDot.className = 'audio-status-dot';
                    audioStatusText.textContent = '音效未就绪';
                    audioEnabled = false;
                }
            }

            function initAudioContext() {
                if (audioContext) return;
                try {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    audioContext.onstatechange = updateAudioStatusUI;
                } catch (e) {
                    console.warn('Web Audio API 不支持');
                }
            }

            async function loadExternalSoundFromPath(path) {
                if (!path || path.trim() === '') {
                    console.log('未配置外部音效路径，将无音效。');
                    hasExternalSound = false;
                    customSoundBuffer = null;
                    updateAudioStatusUI();
                    return;
                }

                if (!audioContext) {
                    initAudioContext();
                    if (!audioContext) return;
                }

                try {
                    const response = await fetch(path, { mode: 'cors', cache: 'force-cache' });
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    const arrayBuffer = await response.arrayBuffer();
                    customSoundBuffer = await audioContext.decodeAudioData(arrayBuffer);
                    hasExternalSound = true;
                    console.log('✅ 外部音效加载成功:', path);
                } catch (err) {
                    console.warn('⚠️ 外部音效加载失败，将全程无音效:', err);
                    hasExternalSound = false;
                    customSoundBuffer = null;
                }
                updateAudioStatusUI();
            }

            async function enableAudio() {
                if (!audioContext) {
                    initAudioContext();
                    if (!audioContext) return false;
                }
                if (audioContext.state !== 'running') {
                    try {
                        await audioContext.resume();
                        updateAudioStatusUI();
                        return true;
                    } catch (e) {
                        console.log('音频激活失败', e);
                        return false;
                    }
                }
                return true;
            }

            function playSentenceStartSound() {
                if (!audioEnabled || !audioContext || audioContext.state !== 'running' || !customSoundBuffer) return;

                try {
                    if (currentSoundSource) {
                        try {
                            currentSoundSource.stop();
                        } catch (e) {}
                        currentSoundSource = null;
                    }

                    const source = audioContext.createBufferSource();
                    source.buffer = customSoundBuffer;
                    source.playbackRate.value = SOUND_PLAYBACK_RATE;
                    source.connect(audioContext.destination);
                    
                    currentSoundSource = source;
                    
                    source.onended = () => {
                        if (currentSoundSource === source) {
                            currentSoundSource = null;
                        }
                    };
                    
                    source.start();
                } catch (e) {
                    console.log('播放音效失败', e);
                }
            }

            function stopCurrentSound() {
                if (currentSoundSource) {
                    try {
                        currentSoundSource.stop();
                    } catch (e) {}
                    currentSoundSource = null;
                }
            }

            // ==================== 视频结束检测函数 ====================
            function checkVideoEnd() {
                if (hasRedirected) return; // 已经跳转过，不再重复跳转
                
                // 方法1：通过当前时间和duration比较
                if (video.duration && !isNaN(video.duration)) {
                    // 如果当前时间接近视频末尾（相差小于0.3秒），认为视频即将结束
                    if (video.currentTime >= video.duration - 0.3) {
                        console.log('检测到视频即将结束，准备跳转');
                        redirectToEndPage();
                        return true;
                    }
                } 
                
                // 方法2：如果设置了VIDEO_DURATION，也可以用它作为后备
                if (VIDEO_DURATION > 0 && video.currentTime >= VIDEO_DURATION - 0.3) {
                    console.log('根据预设时长检测到视频即将结束，准备跳转');
                    redirectToEndPage();
                    return true;
                }
                
                return false;
            }

            // ==================== 跳转到结束页面 ====================
            function redirectToEndPage() {
                if (hasRedirected) return;
                hasRedirected = true;
                
                console.log('视频播放结束，即将跳转到：', VIDEO_END_REDIRECT_URL);
                
                // 停止所有打字活动和音效
                if (typingTimeout) {
                    clearTimeout(typingTimeout);
                    typingTimeout = null;
                }
                if (checkInterval) {
                    clearInterval(checkInterval);
                    checkInterval = null;
                }
                stopCurrentSound();
                
                // 淡出效果（可选）
                document.body.style.transition = 'opacity 0.5s';
                document.body.style.opacity = '0';
                
                // 延迟一点执行跳转，让淡出效果可见
                setTimeout(() => {
                    window.location.href = VIDEO_END_REDIRECT_URL;
                }, 500);
            }

            // ==================== 打字机核心 ====================
            function typeWriter(text, speed, callback) {
                isTyping = true;
                let index = 0;
                typedText.textContent = '';

                playSentenceStartSound();

                function type() {
                    if (index < text.length) {
                        typedText.textContent += text.charAt(index);
                        index++;
                        typingTimeout = setTimeout(type, speed);
                    } else {
                        stopCurrentSound();
                        isTyping = false;
                        if (callback) callback();
                    }
                }

                type();
            }

            function moveToHistory(text) {
                const line = document.createElement('div');
                line.className = 'history-line';
                line.textContent = text;
                historyLines.appendChild(line);
                historyLines.scrollTop = historyLines.scrollHeight;
            }

            function checkScript() {
                // 如果已经准备跳转，不再处理新脚本
                if (hasRedirected) return;
                
                // 检查视频是否即将结束
                if (checkVideoEnd()) return;
                
                if (currentScriptIndex >= scriptConfig.length) return;

                const currentTime = video.currentTime;
                const currentScript = scriptConfig[currentScriptIndex];

                if (currentTime >= currentScript.startTime && !isTyping && typedText.textContent === '') {
                    typeWriter(
                        currentScript.text,
                        currentScript.typingSpeed,
                        function() {
                            setTimeout(() => {
                                moveToHistory(currentScript.text);
                                typedText.textContent = '';
                                currentScriptIndex++;
                            }, currentScript.pauseAfter);
                        }
                    );
                }
            }

            function resetTyping() {
                stopCurrentSound();
                
                if (typingTimeout) {
                    clearTimeout(typingTimeout);
                    typingTimeout = null;
                }
                if (checkInterval) {
                    clearInterval(checkInterval);
                    checkInterval = null;
                }

                currentScriptIndex = 0;
                isTyping = false;
                typedText.textContent = '';
                historyLines.innerHTML = '';

                if (!video.paused && !hasRedirected) {
                    checkInterval = setInterval(checkScript, 100);
                }
            }

            // ==================== 视频事件 ====================
            video.addEventListener('play', () => {
                if (!checkInterval && !hasRedirected) {
                    checkInterval = setInterval(checkScript, 100);
                }
            });

            video.addEventListener('pause', () => {
                if (checkInterval) {
                    clearInterval(checkInterval);
                    checkInterval = null;
                }
                stopCurrentSound();
            });

            video.addEventListener('timeupdate', function() {
                // 每次时间更新时检查是否接近结束
                if (!hasRedirected) {
                    checkVideoEnd();
                }
            });

            // 当视频元数据加载完成后，获取实际时长
            video.addEventListener('loadedmetadata', function() {
                videoDuration = video.duration;
                console.log('视频实际时长：', videoDuration, '秒');
            });

            // 视频播放错误处理
            video.addEventListener('error', function() {
                console.error('视频播放错误，5秒后尝试跳转至', VIDEO_END_REDIRECT_URL);
                setTimeout(() => {
                    if (!hasRedirected) {
                        window.location.href = VIDEO_END_REDIRECT_URL;
                    }
                }, 5000);
            });

            // ==================== 初始化 & 自动播放 ====================
            initAudioContext();

            // 加载外部音效
            if (EXTERNAL_SOUND_FILE_PATH && EXTERNAL_SOUND_FILE_PATH.trim() !== '') {
                loadExternalSoundFromPath(EXTERNAL_SOUND_FILE_PATH);
            } else {
                hasExternalSound = false;
                customSoundBuffer = null;
                console.log('未配置外部音效路径，页面将完全静音。');
                updateAudioStatusUI();
            }

            // 移除loop属性，确保视频不会循环播放
            video.removeAttribute('loop');
            
            // 尝试播放视频
            video.load();
            const playPromise = video.play();
            
            if (playPromise !== undefined) {
                playPromise.catch(error => {
                    console.log('视频自动播放被浏览器阻止，等待用户点击页面以播放。');
                    
                    const startVideoOnClick = async function() {
                        try {
                            await video.play();
                            if (hasExternalSound && customSoundBuffer) {
                                await enableAudio();
                            }
                        } catch (e) {
                            console.warn('用户点击后仍无法播放视频:', e);
                        }
                        document.removeEventListener('click', startVideoOnClick);
                    };
                    document.addEventListener('click', startVideoOnClick, { once: true });
                });
            }

            // 音频激活
            document.addEventListener('click', async function activateAudioOnFirstClick() {
                if (hasExternalSound && customSoundBuffer && audioContext && audioContext.state !== 'running') {
                    await enableAudio();
                }
            }, { once: true });

            // 额外安全机制：如果视频卡住或其他原因没触发跳转，设置一个最大时间强制跳转
            // 例如视频最长35秒，设置40秒后强制跳转
            setTimeout(() => {
                if (!hasRedirected) {
                    console.log('安全计时器触发：视频播放超时，强制跳转');
                    redirectToEndPage();
                }
            }, (VIDEO_DURATION + 10) * 1000); // 视频时长+10秒后强制跳转

        })();
    </script>
</body>
</html>
