<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>纯净 · 双图一按钮</title>
    <style>
        /* 彻底清除所有默认边距，保证只有纯粹的画面 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* 满屏无滚动 */
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
        }

        /* 主容器：背景图片层 */
        .background {
            position: relative;
            width: 100%;
            height: 100%;
            /* 背景图片 — 选用宁静的远景 */
            background-image: url('FZ2.png');
            background-size: 45%;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* 左上角控制按钮区域 */
        .top-controls {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            display: flex;
            gap: 10px;
        }

        .control-btn {
            background-color: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.25);
            padding: 10px 24px;
            font-size: 1rem;
            font-weight: 500;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .control-btn:hover {
            background-color: rgba(40, 40, 55, 0.8);
            border-color: rgba(255, 255, 255, 0.4);
            transform: translateY(-2px);
        }

        /* 透明度控制面板 */
        .opacity-panel {
            position: absolute;
            top: 70px;
            left: 20px;
            z-index: 100;
            background-color: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 15px 20px;
            display: none;
            min-width: 200px;
        }

        .opacity-panel.show {
            display: block;
        }

        .opacity-label {
            color: white;
            font-size: 0.9rem;
            margin-bottom: 10px;
            display: block;
        }

        .opacity-slider {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.3);
            outline: none;
            -webkit-appearance: none;
        }

        .opacity-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: rgba(100, 150, 255, 0.9);
            cursor: pointer;
            border: 2px solid white;
        }

        .opacity-slider::-moz-range-thumb {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: rgba(100, 150, 255, 0.9);
            cursor: pointer;
            border: 2px solid white;
        }

        .opacity-value {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.85rem;
            margin-top: 8px;
            text-align: center;
        }

        /* 悬浮图片容器 */
        .floating-container {
            position: absolute;
            left: 49vw;
            top: 12.9vh;
            width: 115px;
            height: auto;
            z-index: 10;
            cursor: move;
            user-select: none;
        }

        /* 悬浮图片 */
        .floating-pic {
            width: 100%;
            height: auto;
            object-fit: contain;
            display: block;
            transition: opacity 0.1s ease;
        }

        /* 四角控制点 */
        .resize-handle {
            position: absolute;
            width: 12px;
            height: 12px;
            background-color: rgba(255, 255, 255, 0.9);
            border: 2px solid #333;
            border-radius: 50%;
            z-index: 20;
            cursor: pointer;
        }

        .resize-handle.nw { top: -6px; left: -6px; cursor: nw-resize; }
        .resize-handle.ne { top: -6px; right: -6px; cursor: ne-resize; }
        .resize-handle.sw { bottom: -6px; left: -6px; cursor: sw-resize; }
        .resize-handle.se { bottom: -6px; right: -6px; cursor: se-resize; }

        /* 旋转控制点 */
        .rotate-handle {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            width: 16px;
            height: 16px;
            background-color: rgba(100, 150, 255, 0.9);
            border: 2px solid #333;
            border-radius: 50%;
            z-index: 20;
            cursor: grab;
        }

        .rotate-handle:active {
            cursor: grabbing;
        }

        /* 旋转手柄连接线 */
        .rotate-line {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 2px;
            height: 15px;
            background-color: #333;
            z-index: 19;
        }

        /* 返回按钮 */
        .back-button {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            background-color: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.25);
            padding: 12px 40px;
            font-size: 1.2rem;
            font-weight: 500;
            border-radius: 50px;
            letter-spacing: 1px;
            cursor: pointer;
            transition: none;
            line-height: 1.2;
            font-family: inherit;
        }

        .back-button:hover {
            background-color: rgba(40, 40, 55, 0.8);
            border-color: rgba(255, 255, 255, 0.4);
        }

        /* 选中状态 */
        .floating-container.selected {
            outline: 2px dashed rgba(100, 150, 255, 0.5);
        }

        /* 针对极小屏幕简单调整 */
        @media (max-width: 600px) {
            .floating-container {
                width: 200px;
                left: 8vw;
                top: 12vh;
            }
            .back-button {
                padding: 10px 30px;
                font-size: 1rem;
            }
            .top-controls {
                top: 10px;
                left: 10px;
            }
            .control-btn {
                padding: 8px 16px;
                font-size: 0.9rem;
            }
            .opacity-panel {
                left: 10px;
                top: 60px;
                min-width: 160px;
            }
        }
    </style>
</head>
<body>
    <div class="background">
        <!-- 左上角控制按钮 -->
        <div class="top-controls">
            <button class="control-btn" id="modifyBtn">修改</button>
            <button class="control-btn" id="hintBtn">提示</button>
        </div>

        <!-- 透明度控制面板 -->
        <div class="opacity-panel" id="opacityPanel">
            <label class="opacity-label">图片透明度</label>
            <input type="range" class="opacity-slider" id="opacitySlider" min="0" max="100" value="100">
            <div class="opacity-value" id="opacityValue">100%</div>
        </div>

        <!-- 悬浮图片容器 -->
        <div class="floating-container" id="floatingContainer">
            <img src="image.png" 
                 alt=" "               
                 class="floating-pic"
                 id="floatingPic"
                 aria-hidden="true">
            
            <!-- 四角缩放控制点 -->
            <div class="resize-handle nw" data-handle="nw"></div>
            <div class="resize-handle ne" data-handle="ne"></div>
            <div class="resize-handle sw" data-handle="sw"></div>
            <div class="resize-handle se" data-handle="se"></div>
            
            <!-- 旋转控制 -->
            <div class="rotate-line"></div>
            <div class="rotate-handle" id="rotateHandle"></div>
        </div>

        <!-- 底部返回按钮 -->
        <button class="back-button" id="returnButton">返回</button>
    </div>

    <script>
        (function() {
            const container = document.getElementById('floatingContainer');
            const pic = document.getElementById('floatingPic');
            const rotateHandle = document.getElementById('rotateHandle');
            const resizeHandles = document.querySelectorAll('.resize-handle');
            const backBtn = document.getElementById('returnButton');
            const modifyBtn = document.getElementById('modifyBtn');
            const hintBtn = document.getElementById('hintBtn');
            const opacityPanel = document.getElementById('opacityPanel');
            const opacitySlider = document.getElementById('opacitySlider');
            const opacityValue = document.getElementById('opacityValue');
            
            let isDragging = false;
            let isResizing = false;
            let isRotating = false;
            let startX, startY;
            let startLeft, startTop;
            let startWidth, startHeight;
            let currentRotation = 0;
            let startAngle = 0;
            let activeHandle = null;
            let isHintImage = false;
            
            // 修改按钮 - 跳转到FZ2.html
            modifyBtn.addEventListener('click', function() {
                window.location.href = 'FZ2.html';
            });
            
            // 提示按钮 - 替换图片并显示透明度控制
            hintBtn.addEventListener('click', function() {
                if (!isHintImage) {
                    // 替换为提示图片
                    pic.src = 'image-2.png';
                    isHintImage = true;
                    // 显示透明度控制面板
                    opacityPanel.classList.add('show');
                    // 重置透明度
                    pic.style.opacity = '1';
                    opacitySlider.value = 100;
                    opacityValue.textContent = '100%';
                } else {
                    // 切换回原图
                    pic.src = 'image.png';
                    isHintImage = false;
                    // 隐藏透明度控制面板
                    opacityPanel.classList.remove('show');
                    // 重置透明度
                    pic.style.opacity = '1';
                }
            });
            
            // 透明度滑块控制
            opacitySlider.addEventListener('input', function() {
                const value = this.value;
                const opacity = value / 100;
                pic.style.opacity = opacity;
                opacityValue.textContent = value + '%';
            });
            
            // 获取容器中心点
            function getCenter() {
                const rect = container.getBoundingClientRect();
                return {
                    x: rect.left + rect.width / 2,
                    y: rect.top + rect.height / 2
                };
            }
            
            // 获取角度
            function getAngle(x, y) {
                const center = getCenter();
                return Math.atan2(y - center.y, x - center.x) * 180 / Math.PI;
            }
            
            // 拖动功能
            container.addEventListener('mousedown', function(e) {
                if (e.target.classList.contains('resize-handle') || 
                    e.target.classList.contains('rotate-handle')) return;
                
                isDragging = true;
                startX = e.clientX;
                startY = e.clientY;
                startLeft = container.offsetLeft;
                startTop = container.offsetTop;
                container.classList.add('selected');
                e.preventDefault();
            });
            
            // 缩放功能
            resizeHandles.forEach(handle => {
                handle.addEventListener('mousedown', function(e) {
                    isResizing = true;
                    activeHandle = this.dataset.handle;
                    startX = e.clientX;
                    startY = e.clientY;
                    startWidth = container.offsetWidth;
                    startHeight = container.offsetHeight;
                    startLeft = container.offsetLeft;
                    startTop = container.offsetTop;
                    e.stopPropagation();
                    e.preventDefault();
                });
            });
            
            // 旋转功能
            rotateHandle.addEventListener('mousedown', function(e) {
                isRotating = true;
                startAngle = getAngle(e.clientX, e.clientY) - currentRotation;
                e.stopPropagation();
                e.preventDefault();
            });
            
            // 鼠标移动
            document.addEventListener('mousemove', function(e) {
                if (isDragging) {
                    const dx = e.clientX - startX;
                    const dy = e.clientY - startY;
                    container.style.left = (startLeft + dx) + 'px';
                    container.style.top = (startTop + dy) + 'px';
                }
                
                if (isResizing) {
                    const dx = e.clientX - startX;
                    const dy = e.clientY - startY;
                    
                    let newWidth = startWidth;
                    let newHeight = startHeight;
                    let newLeft = startLeft;
                    let newTop = startTop;
                    
                    const aspectRatio = startWidth / startHeight;
                    
                    switch(activeHandle) {
                        case 'se':
                            newWidth = Math.max(50, startWidth + dx);
                            newHeight = newWidth / aspectRatio;
                            break;
                        case 'sw':
                            newWidth = Math.max(50, startWidth - dx);
                            newHeight = newWidth / aspectRatio;
                            newLeft = startLeft + (startWidth - newWidth);
                            break;
                        case 'ne':
                            newWidth = Math.max(50, startWidth + dx);
                            newHeight = newWidth / aspectRatio;
                            newTop = startTop + (startHeight - newHeight);
                            break;
                        case 'nw':
                            newWidth = Math.max(50, startWidth - dx);
                            newHeight = newWidth / aspectRatio;
                            newLeft = startLeft + (startWidth - newWidth);
                            newTop = startTop + (startHeight - newHeight);
                            break;
                    }
                    
                    container.style.width = newWidth + 'px';
                    container.style.height = 'auto';
                    container.style.left = newLeft + 'px';
                    container.style.top = newTop + 'px';
                }
                
                if (isRotating) {
                    const angle = getAngle(e.clientX, e.clientY);
                    currentRotation = angle - startAngle;
                    container.style.transform = `rotate(${currentRotation}deg)`;
                }
            });
            
            // 鼠标释放
            document.addEventListener('mouseup', function() {
                isDragging = false;
                isResizing = false;
                isRotating = false;
                activeHandle = null;
            });
            
            // 点击空白处取消选中
            document.addEventListener('click', function(e) {
                if (!container.contains(e.target) && 
                    !e.target.closest('.top-controls') && 
                    !e.target.closest('.opacity-panel')) {
                    container.classList.remove('selected');
                }
            });
            
            // 返回按钮
            backBtn.addEventListener('click', function() {
                window.location.replace('website1.html');
            });
        })();
    </script>
</body>
</html>
