<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>引入</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background-color: #000;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            font-family: Arial, sans-serif;
            position: relative;
        }

        /* 波动柱形容器 */
        .audio-wave {
            display: flex;
            align-items: center;
            gap: 1px;
            height: 100px;
            width: 60%;
            margin-top: 45vh;
            margin-left: auto;
            margin-right: auto;
        }

        .wave-bar {
            width: calc(100% / 100);
            background-color: #ccc;
            border-radius: 0;
            transition: height 0.15s ease;
            height: 5px;
        }

        /* 文字轮播容器 */
        .text-container {
            color: #fff;
            font-size: 32px;
            font-weight: 400;
            letter-spacing: 1px;
            height: 50px;
            line-height: 50px;
            text-align: center;
            width: 100%;
            position: absolute;
            bottom: 15vh;
            left: 0;
            pointer-events: none;
            text-shadow: 0 0 8px rgba(255,255,255,0.5);
        }

        .text-item {
            display: none;
        }

        .text-item.active {
            display: block;
            animation: fadeInOut 0.4s ease;
        }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateY(6px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* 音量控制 */
        .volume-control {
            position: absolute;
            bottom: 30px;
            right: 30px;
            background: #1a1a1a;
            padding: 12px 20px;
            border: 1px solid #444;
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 100;
            box-shadow: 4px 4px 10px rgba(0,0,0,0.7);
            border-radius: 0;
        }

        .volume-control span {
            color: #eee;
            font-size: 18px;
            font-weight: 300;
        }

        .volume-control input[type=range] {
            -webkit-appearance: none;
            width: 160px;
            height: 6px;
            background: #333;
            border-radius: 0;
            outline: none;
        }

        .volume-control input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: #ccc;
            border-radius: 0;
            cursor: pointer;
            border: 2px solid #fff;
            box-shadow: 0 2px 8px black;
        }

        .volume-value {
            min-width: 45px;
            text-align: right;
            color: #ccc;
            font-size: 18px;
        }

        /* 跳过按钮 */
        .skip-button {
            position: absolute;
            bottom: 30px;
            left: 30px;
            background: #1a1a1a;
            border: 1px solid #444;
            color: #eee;
            font-size: 20px;
            padding: 12px 32px;
            cursor: pointer;
            z-index: 100;
            box-shadow: 4px 4px 10px rgba(0,0,0,0.7);
            border-radius: 0;
            transition: background 0.2s;
            font-weight: 300;
            letter-spacing: 2px;
        }

        .skip-button:hover {
            background: #2f2f2f;
            border-color: #666;
            color: #fff;
        }

        .skip-button:active {
            background: #3f3f3f;
            transform: translate(1px, 1px);
            box-shadow: 2px 2px 8px rgba(0,0,0,0.7);
        }

        /* 提示 */
        .hint {
            position: absolute;
            top: 12px;
            right: 20px;
            color: #aaa;
            font-size: 13px;
            background: rgba(255,255,255,0.05);
            padding: 4px 12px;
            border-radius: 0;
            z-index: 30;
        }

        .sync-hint {
            position: absolute;
            top: 12px;
            left: 20px;
            color: #888;
            font-size: 12px;
            background: rgba(0,0,0,0.3);
            padding: 4px 8px;
            border: 1px solid #333;
            z-index: 30;
        }
    </style>
</head>
<body>
    <!-- 波动柱状图容器 -->
    <div class="audio-wave" id="audioWave"></div>

    <!-- 文字轮播区 (20组文字) -->
    <div class="text-container" id="textContainer">
        <div class="text-item">各位听众早上好</div>
        <div class="text-item">这里是南山市新闻广播早间新闻</div>
        <div class="text-item">现在为您插播一条突发警情通报</div>
        <div class="text-item">2025年11月11日清晨</div>
        <div class="text-item">我市氹环区海湾金融城</div>
        <div class="text-item">“提希丰”高端养生会所内</div>
        <div class="text-item">保洁人员在贵宾包间内发现一具女性尸体</div>
        <div class="text-item">经警方初步核实</div>
        <div class="text-item">死者为林静怡，40岁</div>
        <div class="text-item">深南市千禧会计事务所高级会计师</div>
        <div class="text-item">目前</div>
        <div class="text-item">南山市氹环区天路分局已正式介入该案调查</div>
        <div class="text-item">展开全面排查</div>
        <div class="text-item">警方呼吁</div>
        <div class="text-item">广大市民若在11月10日晚间至11月11日清晨</div>
        <div class="text-item">在南山市氹环区海湾金融城周边看到过林静怡</div>
        <div class="text-item">或有相关可疑人员、可疑行为线索</div>
        <div class="text-item">及时拨打110报警电话</div>
        <div class="text-item">向警方提供有效信息，协助案件侦破</div>
        <div class="text-item">本台将持续跟踪该案进展</div>
        <div class="text-item">接下来，为您播报其他早间新闻...</div>
    </div>

    <!-- 音量控制 -->
    <div class="volume-control">
        <span>🔊 音量</span>
        <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.7">
        <span class="volume-value" id="volumePercent">70%</span>
    </div>

    <!-- 跳过按钮 -->
    <div class="skip-button" id="skipBtn">⏭ 跳过</div>

   

    <script>
        (function() {
            // ========== 1. 初始化柱形 (100个) ==========
            const waveContainer = document.getElementById('audioWave');
            const barCount = 100;
            const maxBarHeight = 270;
            const highBarProbability = 0.15;
            const baseHeight = 3;

            function initWaves() {
                for (let i = 0; i < barCount; i++) {
                    const bar = document.createElement('div');
                    bar.className = 'wave-bar';
                    waveContainer.appendChild(bar);
                }
            }
            initWaves();

            // ========== 2. 波动动画 ==========
            function animateWaves() {
                const bars = document.querySelectorAll('.wave-bar');
                bars.forEach((bar, index) => {
                    let randomValue = Math.random();
                    randomValue = Math.pow(randomValue, 2);

                    let height;
                    if (Math.random() < highBarProbability) {
                        height = baseHeight + (Math.random() * maxBarHeight * 0.8);
                    } else {
                        height = baseHeight + (randomValue * maxBarHeight * 0.3);
                    }

                    const sineFactor = Math.sin((index / barCount) * Math.PI);
                    height = height * sineFactor;

                    bar.style.height = `${Math.max(height, baseHeight)}px`;
                });

                requestAnimationFrame(() => {
                    setTimeout(animateWaves, 150);
                });
            }
            animateWaves();

            // ========== 3. 时间轴文字轮播 ==========
            const textItems = document.querySelectorAll('.text-item');
            
            // 时间轴配置
            const textTimeline = [
                { start: 1540, end: 3550 },      //各位听众早上好
                { start: 3550, end: 6950 },     // 里是南山市新闻广播早间新闻
                { start: 6950, end: 10100 },     // 现在为您插播一条突发警情通报
                { start: 10100, end: 13500 },    // 2025年11月11日清晨
                { start: 13500, end: 16000 },   // 我市氹环区海湾金融城
                { start: 16000, end: 18000 },   //“提希丰”高端养生会所内
                { start: 18000, end: 22500 },   // 保洁人员在贵宾包间内发现一具女性尸体
                { start: 22500, end: 25000 },   //经警方初步核实
                { start: 25000, end: 28500 },   // 死者为林静怡，40岁
                { start: 28500, end: 32700 },   // 深南市千禧会计事务所高级会计师
                { start: 32700, end: 33800 },   // 目前
                { start: 33800, end: 38500 },   // 南山市氹环区天路分局已正式介入该案调查
                { start: 38500, end: 40500 },   // 展开全面排查
                { start: 40500, end: 42000 },   // 警方呼吁
                { start: 42000, end: 47500 },   // 广大市民若在11月10日晚间至11月11日清晨
                { start: 47500, end: 52500 },   // 在南山市氹环区海湾金融城周边看到过林静怡
                { start: 52500, end: 56000 },   // 或有相关可疑人员、可疑行为线索
                { start: 56000, end: 59000 },   // 及时拨打110报警电话
                { start: 59000, end: 63600 },   // 向警方提供有效信息，协助案件侦破
                { start: 63600, end: 66500 },   // 本台将持续跟踪该案进展
                { start: 66500, end: 72000 }    // 接下来，为您播报其他早间新闻...
            ];

            const totalDuration = textTimeline[textTimeline.length - 1].end;

            let animationFrame = null;
            const pageStartTime = performance.now(); // 页面启动时间戳（全局）

            function updateTextByTime(currentTime) {
                let activeIndex = -1;

                for (let i = 0; i < textTimeline.length; i++) {
                    if (currentTime >= textTimeline[i].start && currentTime < textTimeline[i].end) {
                        activeIndex = i;
                        break;
                    }
                }

                textItems.forEach((item, index) => {
                    if (index === activeIndex) {
                        item.classList.add('active');
                    } else {
                        item.classList.remove('active');
                    }
                });

                if (currentTime >= totalDuration) {
                    redirectToPage();
                }
            }

            function redirectToPage() {
                window.location.href = "story1.html";
            }

            function tick() {
                const now = performance.now();
                const elapsed = now - pageStartTime;

                updateTextByTime(elapsed);

                if (elapsed < totalDuration) {
                    animationFrame = requestAnimationFrame(tick);
                } else {
                    redirectToPage();
                }
            }

            animationFrame = requestAnimationFrame(tick);

            // ========== 4. 音频播放与同步（核心修改）==========
            const audioPlayer = new Audio();
            audioPlayer.src = "speechS.mp3";
            audioPlayer.loop = true;
            audioPlayer.volume = 0.7;

            // 记录音频是否已经成功开始播放（避免重复跳转）
            let audioStarted = false;

            // 根据页面已过去时间跳转音频到对应位置
            function seekAudioToCurrentTime() {
                if (audioPlayer.readyState > 0) { // 确保音频元数据已加载
                    const elapsed = performance.now() - pageStartTime;
                    // 将音频跳转到对应时间点（毫秒转秒）
                    audioPlayer.currentTime = elapsed / 1000;
                    console.log(`音频跳转到: ${elapsed/1000}秒`);
                } else {
                    // 如果音频还没加载好，等待loadedmetadata事件
                    audioPlayer.addEventListener('loadedmetadata', function onMeta() {
                        const elapsed = performance.now() - pageStartTime;
                        audioPlayer.currentTime = elapsed / 1000;
                        audioPlayer.removeEventListener('loadedmetadata', onMeta);
                    });
                }
            }

            // 尝试自动播放（标准方式）
            function attemptAutoPlay() {
                const playPromise = audioPlayer.play();
                if (playPromise !== undefined) {
                    playPromise.then(() => {
                        console.log('标准自动播放成功');
                        audioStarted = true;
                        // 播放成功后跳转到当前时间
                        seekAudioToCurrentTime();
                    }).catch(error => {
                        console.log('标准自动播放失败，准备静音+手势同步方案', error);
                        
                        // 静音自动播放（浏览器通常允许）
                        audioPlayer.muted = true;
                        audioPlayer.play().then(() => {
                            console.log('静音自动播放成功，准备同步');
                            audioStarted = true;
                            // 跳转到当前时间
                            seekAudioToCurrentTime();
                            
                            // 延迟取消静音（部分浏览器策略允许）
                            setTimeout(() => {
                                audioPlayer.muted = false;
                                // 确保音量恢复
                                audioPlayer.volume = parseFloat(volumeSlider.value);
                            }, 100);
                        }).catch(e => {
                            console.log('静音自动播放也失败，等待用户手势并同步跳转', e);
                            
                            // 手势监听 - 当用户首次交互时，播放并跳转到当前时间
                            const events = ['touchstart', 'mousedown', 'keydown'];
                            function userGestureHandler() {
                                console.log('用户手势触发，开始同步播放');
                                
                                // 先移除所有监听
                                events.forEach(event => document.removeEventListener(event, userGestureHandler));
                                
                                // 取消静音（如果之前被静音）
                                audioPlayer.muted = false;
                                
                                // 重要：在播放前先跳转到当前时间！
                                seekAudioToCurrentTime();
                                
                                // 然后尝试播放
                                audioPlayer.play().catch(err => {
                                    console.log('手势播放仍然失败，尝试静音+跳转', err);
                                    audioPlayer.muted = true;
                                    audioPlayer.play().then(() => {
                                        setTimeout(() => {
                                            audioPlayer.muted = false;
                                        }, 100);
                                    });
                                });
                            }
                            
                            events.forEach(event => document.addEventListener(event, userGestureHandler, { once: true }));
                        });
                    });
                }
            }

            // 立即尝试自动播放
            attemptAutoPlay();

            // 页面可见性变化时再次尝试（如果还没开始播放）
            document.addEventListener('visibilitychange', function() {
                if (!document.hidden && !audioStarted && audioPlayer.paused) {
                    console.log('页面可见，重新尝试自动播放');
                    attemptAutoPlay();
                }
            });

            // 确保音频元数据加载后，如果还没开始但需要跳转（用于手势场景）
            audioPlayer.addEventListener('loadedmetadata', function() {
                // 如果音频已经通过其他方式开始，无需额外操作
                if (!audioStarted && audioPlayer.paused) {
                    // 什么都不做，等待手势触发
                }
            });

            // ========== 5. 音量调节 ==========
            const volumeSlider = document.getElementById('volumeSlider');
            const volumePercent = document.getElementById('volumePercent');

            function updateVolume() {
                const val = parseFloat(volumeSlider.value);
                audioPlayer.volume = val;
                volumePercent.textContent = Math.round(val * 100) + '%';
            }
            volumeSlider.addEventListener('input', updateVolume);
            updateVolume();

            // 确保静音状态与音量滑块联动
            volumeSlider.addEventListener('mousedown', function() {
                if (audioPlayer.muted) {
                    audioPlayer.muted = false;
                }
            });

            // ========== 6. 跳过按钮 ==========
            const skipBtn = document.getElementById('skipBtn');
            skipBtn.addEventListener('click', function() {
                window.location.href = "story1.html";
            });

        })();
    </script>
</body>

</html>
