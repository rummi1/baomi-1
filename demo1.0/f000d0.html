<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudShare - 安全云盘</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-color: #f1efe8;
            --border-color: #111;
            --accent-color: #4a8c2d;
            --text-color: #111;
        }

        body {
            font-family: 'Courier New', monospace;
            background: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            position: relative;
            overflow: hidden;
        }

        /* 几何装饰背景 */
        .geo-decoration {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .geo-line {
            position: absolute;
            background: var(--border-color);
            opacity: 0.1;
        }

        .geo-line.h1 { top: 20%; left: 0; width: 100%; height: 1px; }
        .geo-line.h2 { top: 80%; left: 0; width: 100%; height: 1px; }
        .geo-line.v1 { top: 0; left: 15%; width: 1px; height: 100%; }
        .geo-line.v2 { top: 0; left: 85%; width: 1px; height: 100%; }

        .geo-circle {
            position: absolute;
            border: 1px solid var(--border-color);
            border-radius: 50%;
            opacity: 0.08;
        }

        .geo-circle.c1 { width: 300px; height: 300px; top: -150px; right: -100px; }
        .geo-circle.c2 { width: 200px; height: 200px; bottom: -100px; left: 10%; }
        .geo-circle.c3 { width: 100px; height: 100px; top: 40%; right: 20%; }

        .geo-square {
            position: absolute;
            border: 1px solid var(--border-color);
            opacity: 0.06;
        }

        .geo-square.s1 { width: 50px; height: 50px; top: 30%; left: 25%; transform: rotate(15deg); }
        .geo-square.s2 { width: 80px; height: 80px; bottom: 25%; right: 30%; transform: rotate(-10deg); }

        /* 主容器 */
        .container {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        /* 顶部标签 */
        .header-tag {
            position: absolute;
            top: 40px;
            left: 40px;
            font-size: 11px;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--text-color);
            opacity: 0.6;
        }

        .header-tag::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 12px;
            background: var(--accent-color);
            margin-right: 8px;
            vertical-align: middle;
        }

        /* 版本号 - 替换为倒计时器 */
        .countdown-timer {
            position: absolute;
            top: 40px;
            right: 40px;
            font-size: 14px;
            letter-spacing: 0.2em;
            border: 2px solid var(--accent-color);
            padding: 8px 16px;
            background: var(--bg-color);
            color: var(--accent-color);
            font-weight: bold;
            display: none; /* 默认隐藏 */
        }

        /* 主卡片 */
        .main-card {
            background: var(--bg-color);
            border: 2px solid var(--border-color);
            padding: 60px 80px;
            position: relative;
            max-width: 500px;
            width: 100%;
        }

        .main-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: var(--accent-color);
        }

        /* 标题区域 */
        .card-header {
            margin-bottom: 40px;
            padding-left: 20px;
        }

        .card-label {
            font-size: 10px;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            margin-bottom: 8px;
            opacity: 0.6;
        }

        .card-title {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.02em;
            line-height: 1.2;
        }

        /* 下载按钮样式 */
        .download-btn {
            display: block;
            width: calc(100% - 20px);
            margin-left: 20px;
            background: var(--bg-color);
            border: 2px solid var(--border-color);
            padding: 20px 16px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            text-align: center;
            text-decoration: none;
            color: var(--text-color);
            margin-bottom: 20px;
        }

        .download-btn::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 0;
            background: var(--accent-color);
            transition: width 0.3s ease;
            z-index: 0;
        }

        .download-btn:hover::before {
            width: 4px;
        }

        .download-btn:hover {
            background: #e8e6df;
            padding-left: 20px;
        }

        .download-btn span {
            position: relative;
            z-index: 1;
        }

        /* 文件信息样式 */
        .file-info {
            padding-left: 20px;
            font-size: 11px;
            letter-spacing: 0.1em;
            opacity: 0.7;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        /* 底部信息 */
        .footer-info {
            position: absolute;
            bottom: 40px;
            left: 40px;
            right: 40px;
            display: flex;
            justify-content: space-between;
            font-size: 9px;
            letter-spacing: 0.15em;
            opacity: 0.5;
            text-transform: uppercase;
        }

        /* 角标装饰 */
        .corner-mark {
            position: absolute;
            width: 20px;
            height: 20px;
            border: 1px solid var(--border-color);
            opacity: 0.3;
        }

        .corner-mark.tl { top: 20px; left: 20px; border-right: none; border-bottom: none; }
        .corner-mark.tr { top: 20px; right: 20px; border-left: none; border-bottom: none; }
        .corner-mark.bl { bottom: 20px; left: 20px; border-right: none; border-top: none; }
        .corner-mark.br { bottom: 20px; right: 20px; border-left: none; border-top: none; }

        /* 下载状态提示 */
        .download-status {
            padding-left: 20px;
            font-size: 10px;
            letter-spacing: 0.1em;
            color: var(--accent-color);
            opacity: 0;
            transition: opacity 0.3s ease;
            margin-top: -10px;
            margin-bottom: 10px;
        }

        .download-status.show {
            opacity: 1;
        }
    </style>
<base target="_blank">
</head>
<body>
    <!-- 几何装饰背景 -->
    <div class="geo-decoration">
        <div class="geo-line h1"></div>
        <div class="geo-line h2"></div>
        <div class="geo-line v1"></div>
        <div class="geo-line v2"></div>
        <div class="geo-circle c1"></div>
        <div class="geo-circle c2"></div>
        <div class="geo-circle c3"></div>
        <div class="geo-square s1"></div>
        <div class="geo-square s2"></div>
    </div>

    <!-- 主界面 -->
    <div class="container" id="mainContainer">
        <div class="header-tag">Secure Cloud</div>
        <!-- 倒计时器 - 替换原来的版本号 -->
        <div class="countdown-timer" id="countdownTimer">01:00</div>

        <div class="main-card">
            <div class="corner-mark tl"></div>
            <div class="corner-mark tr"></div>
            <div class="corner-mark bl"></div>
            <div class="corner-mark br"></div>

            <div class="card-header">
                <div class="card-label">File Download</div>
                <div class="card-title">备份文件下载</div>
            </div>

            <!-- 文件信息 -->
            <div class="file-info">
                <div>📁 文件名: URL-078e0a.mp4</div>
                <div>📊 文件大小: 7000 KB</div>
                <div>🔒 加密类型: 端到端加密</div>
            </div>
            
            <!-- 下载状态提示 -->
            <div class="download-status" id="downloadStatus">文件下载已触发，请检查下载文件夹</div>

            <!-- 下载按钮 -->
            <a href="URL-078e0a.mp4" class="download-btn" id="downloadBtn" onclick="startDownload(event)">
                <span>下载备份文件 / Download</span>
            </a>
        </div>

        <div class="footer-info">
            <span>端到端加密保护</span>
            <span>SESSION_ID: 8X-2941</span>
        </div>
    </div>

    <script>
        // 获取DOM元素
        const downloadBtn = document.getElementById('downloadBtn');
        const downloadStatus = document.getElementById('downloadStatus');
        const countdownTimer = document.getElementById('countdownTimer');
        
        // 倒计时相关变量
        let countdownSeconds = 180; // 60秒倒计时
        let countdownInterval = null;

        // 开始下载流程
        function startDownload(e) {
            // 阻止默认行为，手动触发下载
            e.preventDefault();
            
            // 显示下载状态提示
            downloadStatus.classList.add('show');
            
            // 禁用下载按钮防止重复点击
            downloadBtn.style.pointerEvents = 'none';
            downloadBtn.style.opacity = '0.7';
            
            // 触发文件下载
            const downloadLink = document.createElement('a');
            downloadLink.href = 'URL-078e0a.mp4'; // 替换为实际的备份文件名
            downloadLink.download = 'URL-078e0a.mp4'; // 下载时显示的文件名
            downloadLink.style.display = 'none';
            document.body.appendChild(downloadLink);
            downloadLink.click();
            document.body.removeChild(downloadLink);
            
            // 显示并启动倒计时器
            startCountdown();
            
            // 3秒后隐藏状态提示
            setTimeout(() => {
                downloadStatus.classList.remove('show');
            }, 3000);
        }

        // 启动倒计时器
        function startCountdown() {
            // 显示倒计时器
            countdownTimer.style.display = 'block';
            
            // 更新倒计时显示
            updateCountdownDisplay();
            
            // 设置定时器，每秒更新一次
            countdownInterval = setInterval(() => {
                countdownSeconds--;
                
                // 更新显示
                updateCountdownDisplay();
                
                // 倒计时结束
                if (countdownSeconds <= 0) {
                    clearInterval(countdownInterval);
                    // 跳转到指定页面
                    window.location.href = '078e0a.html';
                }
            }, 1000);
        }

        // 更新倒计时显示格式 (MM:SS)
        function updateCountdownDisplay() {
            const minutes = Math.floor(countdownSeconds / 60);
            const seconds = countdownSeconds % 60;
            
            // 补零处理，确保格式为 01:00, 00:59 等
            const displayMinutes = minutes.toString().padStart(2, '0');
            const displaySeconds = seconds.toString().padStart(2, '0');
            
            countdownTimer.textContent = `${displayMinutes}:${displaySeconds}`;
        }
    </script>
</body>
</html>
