<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>汉字方阵 · 拖拽版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-color: #f1efe8;
            --border-color: #111;
            --accent-color: #4a8c2d;
            --text-color: #111;
        }

        body {
            font-family: 'Courier New', 'Noto Serif SC', 'SimSun', serif;
            background: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            position: relative;
            overflow: hidden;
            line-height: 1.6;
        }

        /* 几何装饰背景 */
        .geo-decoration {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .geo-line {
            position: absolute;
            background: var(--border-color);
            opacity: 0.08;
        }

        .geo-line.h1 { top: 15%; left: 0; width: 100%; height: 1px; }
        .geo-line.h2 { top: 45%; left: 0; width: 60%; height: 1px; }
        .geo-line.h3 { top: 75%; left: 40%; width: 60%; height: 1px; }
        .geo-line.v1 { top: 0; left: 10%; width: 1px; height: 100%; }
        .geo-line.v2 { top: 0; left: 90%; width: 1px; height: 40%; }
        .geo-line.v3 { top: 60%; left: 50%; width: 1px; height: 40%; }

        .geo-circle {
            position: absolute;
            border: 1px solid var(--border-color);
            border-radius: 50%;
            opacity: 0.06;
        }

        .geo-circle.c1 { width: 400px; height: 400px; top: -200px; right: -100px; }
        .geo-circle.c2 { width: 250px; height: 250px; bottom: 10%; left: -100px; }
        .geo-circle.c3 { width: 120px; height: 120px; top: 30%; right: 15%; }

        .geo-square {
            position: absolute;
            border: 1px solid var(--border-color);
            opacity: 0.05;
        }

        .geo-square.s1 { width: 60px; height: 60px; top: 20%; left: 20%; transform: rotate(20deg); }
        .geo-square.s2 { width: 40px; height: 40px; bottom: 30%; right: 25%; transform: rotate(-15deg); }
        .geo-square.s3 { width: 80px; height: 80px; top: 60%; left: 70%; transform: rotate(45deg); }

        /* 主容器 */
        .container {
            position: relative;
            z-index: 1;
            width: 100vw;
            height: 100vh;
            padding: 40px;
        }

        /* 左上角控制按钮区域 */
        .top-controls {
            position: absolute;
            top: 40px;
            left: 40px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 12px;
            /* 设置固定宽度，透明度面板将以此为基准 */
            width: fit-content;
        }

        .control-btn {
            background: var(--bg-color);
            color: var(--text-color);
            border: 2px solid var(--border-color);
            padding: 12px 24px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Courier New', 'Noto Serif SC', 'SimSun', serif;
            position: relative;
            text-align: left;
            /* 确保按钮宽度由内容决定 */
            width: 100%;
            white-space: nowrap;
        }

        .control-btn::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 0;
            background: var(--accent-color);
            transition: width 0.3s ease;
        }

        .control-btn:hover {
            transform: translateX(4px);
            padding-left: 28px;
        }

        .control-btn:hover::before {
            width: 4px;
        }

        /* 透明度控制面板 */
        .opacity-panel {
            /* 位置：紧跟在"提示"按钮下方 */
            position: relative;
            top: 0;
            left: 0;
            z-index: 100;
            background: var(--bg-color);
            border: 2px solid var(--border-color);
            padding: 20px;
            display: none;
            /* 宽度：与父容器（.top-controls）宽度一致，不超过"提示"按钮宽度 */
            width: 100%;
            min-width: 0;
            max-width: 100%;
            margin-top: 8px;
        }

        .opacity-panel::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: var(--accent-color);
        }

        .opacity-panel.show {
            display: block;
        }

        .opacity-label {
            font-size: 10px;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            margin-bottom: 12px;
            display: block;
            font-weight: 700;
        }

        .opacity-slider {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            outline: none;
            -webkit-appearance: none;
            opacity: 0.3;
        }

        .opacity-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            background: var(--accent-color);
            cursor: pointer;
            border: 2px solid var(--border-color);
        }

        .opacity-slider::-moz-range-thumb {
            width: 16px;
            height: 16px;
            background: var(--accent-color);
            cursor: pointer;
            border: 2px solid var(--border-color);
        }

        .opacity-value {
            font-size: 11px;
            margin-top: 10px;
            text-align: right;
            letter-spacing: 0.1em;
            font-family: 'Courier New', monospace;
        }

        .background {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            /* 默认占视口宽度的 45%，可根据需要调整 */
            width: 70vw;
            height: 70vw;
            /* 最大尺寸限制 */
            max-width: 1000px;
            max-height: 1000px;
            background-image: url('FZ2.png');
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* 悬浮图片容器 */
        .floating-container {
            position: absolute;
            left: 49vw;
            top: 12.9vh;
            width: 115px;
            height: auto;
            z-index: 10;
            cursor: move;
            user-select: none;
            border: 2px solid var(--border-color);
            transition: box-shadow 0.3s ease;
        }

        .floating-container:hover {
            box-shadow: -4px 4px 0 var(--border-color);
        }

        .floating-container.selected {
            outline: 2px dashed var(--accent-color);
            outline-offset: 4px;
        }

        /* 悬浮图片 */
        .floating-pic {
            width: 100%;
            height: auto;
            object-fit: contain;
            display: block;
            transition: opacity 0.1s ease;
        }

        /* 四角控制点 */
        .resize-handle {
            position: absolute;
            width: 10px;
            height: 10px;
            background: var(--bg-color);
            border: 2px solid var(--border-color);
            z-index: 20;
            cursor: pointer;
        }

        .resize-handle.nw { top: -6px; left: -6px; cursor: nw-resize; }
        .resize-handle.ne { top: -6px; right: -6px; cursor: ne-resize; }
        .resize-handle.sw { bottom: -6px; left: -6px; cursor: sw-resize; }
        .resize-handle.se { bottom: -6px; right: -6px; cursor: se-resize; }

        .resize-handle:hover {
            background: var(--accent-color);
        }

        /* 旋转控制点 */
        .rotate-handle {
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            width: 14px;
            height: 14px;
            background: var(--bg-color);
            border: 2px solid var(--border-color);
            z-index: 20;
            cursor: grab;
        }

        .rotate-handle:hover {
            background: var(--accent-color);
        }

        .rotate-handle:active {
            cursor: grabbing;
        }

        /* 旋转手柄连接线 */
        .rotate-line {
            position: absolute;
            top: -24px;
            left: 50%;
            transform: translateX(-50%);
            width: 1px;
            height: 20px;
            background: var(--border-color);
            z-index: 19;
        }

        /* 底部控制栏 */
        .bottom-controls {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            display: flex;
            gap: 20px;
            align-items: center;
        }

        /* 背景大小控制 */
        .size-control {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--bg-color);
            border: 2px solid var(--border-color);
            padding: 12px 20px;
            font-family: 'Courier New', 'Noto Serif SC', 'SimSun', serif;
        }

        .size-label {
            font-size: 11px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            font-weight: 700;
            white-space: nowrap;
        }

        .size-slider {
            width: 120px;
            height: 4px;
            background: var(--border-color);
            outline: none;
            -webkit-appearance: none;
            opacity: 0.6;
        }

        .size-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            background: var(--accent-color);
            cursor: pointer;
            border: 2px solid var(--border-color);
        }

        .size-slider::-moz-range-thumb {
            width: 14px;
            height: 14px;
            background: var(--accent-color);
            cursor: pointer;
            border: 2px solid var(--border-color);
        }

        .size-value {
            font-size: 11px;
            min-width: 35px;
            text-align: right;
            letter-spacing: 0.1em;
            font-family: 'Courier New', monospace;
        }

        /* 返回按钮 */
        .back-button {
            background: var(--bg-color);
            color: var(--text-color);
            border: 2px solid var(--border-color);
            padding: 14px 48px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Courier New', 'Noto Serif SC', 'SimSun', serif;
            position: relative;
        }

        .back-button::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 0;
            background: var(--accent-color);
            transition: width 0.3s ease;
        }

        .back-button:hover {
            transform: translateY(-2px);
            box-shadow: -4px 4px 0 var(--border-color);
        }

        .back-button:hover::before {
            width: 4px;
        }

        /* 角标装饰 */
        .corner-mark {
            position: absolute;
            width: 16px;
            height: 16px;
            border: 1px solid var(--border-color);
            opacity: 0.2;
        }

        .corner-mark.tl { top: 12px; left: 12px; border-right: none; border-bottom: none; }
        .corner-mark.tr { top: 12px; right: 12px; border-left: none; border-bottom: none; }
        .corner-mark.bl { bottom: 12px; left: 12px; border-right: none; border-top: none; }
        .corner-mark.br { bottom: 12px; right: 12px; border-left: none; border-top: none; }

        /* 响应式 */
        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }
            .top-controls {
                top: 20px;
                left: 20px;
            }
            .control-btn {
                padding: 10px 16px;
                font-size: 10px;
            }
            .opacity-panel {
                padding: 15px;
            }
            .floating-container {
                width: 200px;
                left: 8vw;
                top: 12vh;
            }
            .bottom-controls {
                bottom: 20px;
                flex-direction: column;
                gap: 10px;
            }
            .back-button {
                padding: 12px 32px;
                font-size: 11px;
            }
            .background {
                width: 70vw;
                height: 70vw;
            }
        }

        /* 左侧文本框样式 */
        .left-textbox {
            position: absolute;
            left: 40px;
            top: 50%;
            transform: translateY(-50%);
            width: 200px;
            background: var(--bg-color);
            border: 2px solid var(--border-color);
            padding: 24px 16px;
            z-index: 50;
            font-family: 'Courier New', 'Noto Serif SC', 'SimSun', serif;
            position: relative;
            box-shadow: -4px 4px 0 var(--border-color);
        }

        .left-textbox::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: var(--accent-color);
        }

        .textbox-content {
            font-size: 14px;
            line-height: 1.8;
            letter-spacing: 0.05em;
            color: var(--text-color);
            margin: 0;
            writing-mode: horizontal-tb;
            text-align: left;
            font-weight: 400;
        }

        /* 响应式调整 */
        @media (max-width: 1200px) {
            .left-textbox {
                width: 160px;
                padding: 20px 12px;
            }
            .textbox-content {
                font-size: 12px;
            }
        }

        @media (max-width: 900px) {
            .left-textbox {
                display: none; /* 小屏幕隐藏，避免遮挡 */
            }
        }
    </style>
</head>
<body>
    <!-- 几何装饰背景 -->
    <div class="geo-decoration">
        <div class="geo-line h1"></div>
        <div class="geo-line h2"></div>
        <div class="geo-line h3"></div>
        <div class="geo-line v1"></div>
        <div class="geo-line v2"></div>
        <div class="geo-line v3"></div>
        <div class="geo-circle c1"></div>
        <div class="geo-circle c2"></div>
        <div class="geo-circle c3"></div>
        <div class="geo-square s1"></div>
        <div class="geo-square s2"></div>
        <div class="geo-square s3"></div>
    </div>

    <div class="container">
        <!-- 左上角控制按钮 -->
        <div class="top-controls">
            <button class="control-btn" id="modifyBtn">重排方阵（跳转至简单版）</button>
            <button class="control-btn" id="hintBtn">提示</button>
            
            <!-- 透明度控制面板 - 位于提示按钮下方，宽度与按钮一致 -->
            <div class="opacity-panel" id="opacityPanel">
                <div class="corner-mark tl"></div>
                <div class="corner-mark tr"></div>
                <div class="corner-mark bl"></div>
                <div class="corner-mark br"></div>
                <label class="opacity-label">图片透明度 / Opacity</label>
                <input type="range" class="opacity-slider" id="opacitySlider" min="0" max="100" value="100">
                <div class="opacity-value" id="opacityValue">100%</div>
            </div>
        </div>

        <div class="left-textbox">
            <div class="corner-mark tl"></div>
            <div class="corner-mark tr"></div>
            <div class="corner-mark bl"></div>
            <div class="corner-mark br"></div>
            <p class="textbox-content">PS：如果得到答案后不知道去哪里填写，请搜索草稿箱进行信息查找</p>
        </div>

        <!-- 
            背景图片层 - 无边框
            
            调整背景图片在页面上显示大小的方法：
            
            方法1：修改 CSS 中的 width 和 height（当前为 45vw）
            - 打开 <style> 标签中的 .background 类
            - 修改 width: 45vw 和 height: 45vw 的值
            - 例如改为 60vw 可使图片占屏幕宽度的 60%，显示更大
            - 改为 30vw 则显示更小
            
            方法2：修改 max-width 和 max-height（当前为 600px）
            - 这是图片的最大尺寸限制
            - 在大屏幕上，图片不会超过这个像素值
            - 增大到 800px 或 1000px 可让大屏幕显示更大
            
            推荐设置（大屏幕显示更大）：
            width: 60vw;
            height: 60vw;
            max-width: 800px;
            max-height: 800px;
        -->
        <div class="background"></div>

        <!-- 悬浮图片容器 -->
        <div class="floating-container" id="floatingContainer">
            <div class="corner-mark tl"></div>
            <div class="corner-mark tr"></div>
            <div class="corner-mark bl"></div>
            <div class="corner-mark br"></div>
            
            <img src="image.png" 
                 alt=" "               
                 class="floating-pic"
                 id="floatingPic"
                 aria-hidden="true">
            
            <!-- 四角缩放控制点 -->
            <div class="resize-handle nw" data-handle="nw"></div>
            <div class="resize-handle ne" data-handle="ne"></div>
            <div class="resize-handle sw" data-handle="sw"></div>
            <div class="resize-handle se" data-handle="se"></div>
            
            <!-- 旋转控制 -->
            <div class="rotate-line"></div>
            <div class="rotate-handle" id="rotateHandle"></div>
        </div>

        <!-- 底部控制栏 -->
        <div class="bottom-controls">
            <!-- 背景大小控制 -->
            <div class="size-control">
                <span class="size-label">背景大小</span>
                <input type="range" class="size-slider" id="sizeSlider" min="30" max="100" value="70">
                <span class="size-value" id="sizeValue">70%</span>
            </div>
            <button class="back-button" id="returnButton">返回</button>
        </div>
    </div>

    <script>
        (function() {
            const container = document.getElementById('floatingContainer');
            const pic = document.getElementById('floatingPic');
            const rotateHandle = document.getElementById('rotateHandle');
            const resizeHandles = document.querySelectorAll('.resize-handle');
            const backBtn = document.getElementById('returnButton');
            const modifyBtn = document.getElementById('modifyBtn');
            const hintBtn = document.getElementById('hintBtn');
            const opacityPanel = document.getElementById('opacityPanel');
            const opacitySlider = document.getElementById('opacitySlider');
            const opacityValue = document.getElementById('opacityValue');
            const sizeSlider = document.getElementById('sizeSlider');
            const sizeValue = document.getElementById('sizeValue');
            const background = document.querySelector('.background');
            
            let isDragging = false;
            let isResizing = false;
            let isRotating = false;
            let startX, startY;
            let startLeft, startTop;
            let startWidth, startHeight;
            let currentRotation = 0;
            let startAngle = 0;
            let activeHandle = null;
            let isHintImage = false;
            
            // 背景大小滑块控制
            sizeSlider.addEventListener('input', function() {
                const value = this.value;
                const size = value + 'vw';
                background.style.width = size;
                background.style.height = size;
                sizeValue.textContent = value + '%';
            });
            
            // 修改按钮 - 跳转到FZ2.html
            modifyBtn.addEventListener('click', function() {
                window.location.href = 'd05fe4.html';
            });
            
            // 提示按钮 - 替换图片并显示透明度控制
            hintBtn.addEventListener('click', function() {
                if (!isHintImage) {
                    // 替换为提示图片
                    pic.src = 'image-2.png';
                    isHintImage = true;
                    // 显示透明度控制面板
                    opacityPanel.classList.add('show');
                    // 重置透明度
                    pic.style.opacity = '1';
                    opacitySlider.value = 100;
                    opacityValue.textContent = '100%';
                } else {
                    // 切换回原图
                    pic.src = 'image.png';
                    isHintImage = false;
                    // 隐藏透明度控制面板
                    opacityPanel.classList.remove('show');
                    // 重置透明度
                    pic.style.opacity = '1';
                }
            });
            
            // 透明度滑块控制
            opacitySlider.addEventListener('input', function() {
                const value = this.value;
                const opacity = value / 100;
                pic.style.opacity = opacity;
                opacityValue.textContent = value + '%';
            });
            
            // 获取容器中心点
            function getCenter() {
                const rect = container.getBoundingClientRect();
                return {
                    x: rect.left + rect.width / 2,
                    y: rect.top + rect.height / 2
                };
            }
            
            // 获取角度
            function getAngle(x, y) {
                const center = getCenter();
                return Math.atan2(y - center.y, x - center.x) * 180 / Math.PI;
            }
            
            // 拖动功能
            container.addEventListener('mousedown', function(e) {
                if (e.target.classList.contains('resize-handle') || 
                    e.target.classList.contains('rotate-handle')) return;
                
                isDragging = true;
                startX = e.clientX;
                startY = e.clientY;
                startLeft = container.offsetLeft;
                startTop = container.offsetTop;
                container.classList.add('selected');
                e.preventDefault();
            });
            
            // 缩放功能
            resizeHandles.forEach(handle => {
                handle.addEventListener('mousedown', function(e) {
                    isResizing = true;
                    activeHandle = this.dataset.handle;
                    startX = e.clientX;
                    startY = e.clientY;
                    startWidth = container.offsetWidth;
                    startHeight = container.offsetHeight;
                    startLeft = container.offsetLeft;
                    startTop = container.offsetTop;
                    e.stopPropagation();
                    e.preventDefault();
                });
            });
            
            // 旋转功能
            rotateHandle.addEventListener('mousedown', function(e) {
                isRotating = true;
                startAngle = getAngle(e.clientX, e.clientY) - currentRotation;
                e.stopPropagation();
                e.preventDefault();
            });
            
            // 鼠标移动
            document.addEventListener('mousemove', function(e) {
                if (isDragging) {
                    const dx = e.clientX - startX;
                    const dy = e.clientY - startY;
                    container.style.left = (startLeft + dx) + 'px';
                    container.style.top = (startTop + dy) + 'px';
                }
                
                if (isResizing) {
                    const dx = e.clientX - startX;
                    const dy = e.clientY - startY;
                    
                    let newWidth = startWidth;
                    let newHeight = startHeight;
                    let newLeft = startLeft;
                    let newTop = startTop;
                    
                    const aspectRatio = startWidth / startHeight;
                    
                    switch(activeHandle) {
                        case 'se':
                            newWidth = Math.max(50, startWidth + dx);
                            newHeight = newWidth / aspectRatio;
                            break;
                        case 'sw':
                            newWidth = Math.max(50, startWidth - dx);
                            newHeight = newWidth / aspectRatio;
                            newLeft = startLeft + (startWidth - newWidth);
                            break;
                        case 'ne':
                            newWidth = Math.max(50, startWidth + dx);
                            newHeight = newWidth / aspectRatio;
                            newTop = startTop + (startHeight - newHeight);
                            break;
                        case 'nw':
                            newWidth = Math.max(50, startWidth - dx);
                            newHeight = newWidth / aspectRatio;
                            newLeft = startLeft + (startWidth - newWidth);
                            newTop = startTop + (startHeight - newHeight);
                            break;
                    }
                    
                    container.style.width = newWidth + 'px';
                    container.style.height = 'auto';
                    container.style.left = newLeft + 'px';
                    container.style.top = newTop + 'px';
                }
                
                if (isRotating) {
                    const angle = getAngle(e.clientX, e.clientY);
                    currentRotation = angle - startAngle;
                    container.style.transform = `rotate(${currentRotation}deg)`;
                }
            });
            
            // 鼠标释放
            document.addEventListener('mouseup', function() {
                isDragging = false;
                isResizing = false;
                isRotating = false;
                activeHandle = null;
            });
            
            // 点击空白处取消选中
            document.addEventListener('click', function(e) {
                if (!container.contains(e.target) && 
                    !e.target.closest('.top-controls') && 
                    !e.target.closest('.opacity-panel')) {
                    container.classList.remove('selected');
                }
            });
            
            // 返回按钮
            backBtn.addEventListener('click', function() {
                window.location.replace('website1.html');
            });
        })();
    </script>
</body>
</html>
